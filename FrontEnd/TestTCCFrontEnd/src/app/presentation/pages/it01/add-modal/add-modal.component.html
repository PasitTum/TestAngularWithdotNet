<div class="modal d-block" tabindex="-1" style="background: rgba(0,0,0,0.5);">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content border-success">
      <div class="modal-header bg-success text-white justify-content-center py-2">
        <h6 class="modal-title fw-bold">IT 01-2</h6>
      </div>
      <div class="modal-body">
        <form [formGroup]="form">
          <div class="row mb-3 align-items-center">
            <label class="col-3 col-form-label fw-semibold">ชื่อ - สกุล</label>
            <div class="col-9 d-flex gap-2">
              <input
                type="text"
                class="form-control"
                formControlName="firstName"
                placeholder="ชื่อ"
                [class.is-invalid]="form.get('firstName')?.invalid && form.get('firstName')?.touched"
              />
              <input
                type="text"
                class="form-control"
                formControlName="lastName"
                placeholder="สกุล"
                [class.is-invalid]="form.get('lastName')?.invalid && form.get('lastName')?.touched"
              />
            </div>
          </div>

          <div class="row mb-3 align-items-center">
            <label class="col-3 col-form-label fw-semibold">วันเกิด</label>
            <div class="col-9">
              <input
                type="date"
                class="form-control"
                style="max-width: 200px;"
                formControlName="birthDate"
                (change)="onBirthDateChange()"
                [class.is-invalid]="form.get('birthDate')?.invalid && form.get('birthDate')?.touched"
              />
            </div>
          </div>

          <div class="row mb-3 align-items-center">
            <label class="col-3 col-form-label fw-semibold">อายุ</label>
            <div class="col-9">
              <span>{{ calculatedAge }} ปี</span>
            </div>
          </div>

          <div class="row mb-1 align-items-start">
            <label class="col-3 col-form-label fw-semibold">ที่อยู่</label>
            <div class="col-9">
              <textarea
                class="form-control"
                rows="3"
                formControlName="address"
                [class.is-invalid]="form.get('address')?.invalid && form.get('address')?.touched"
              ></textarea>
            </div>
          </div>
        </form>
      </div>
      <div class="modal-footer">
        <button class="btn btn-primary" [disabled]="isSubmitting" (click)="save()">บันทึก</button>
        <button class="btn btn-danger" (click)="cancel()">ยกเลิก</button>
      </div>
    </div>
  </div>
</div>
