<div class="min-vh-100 bg-secondary bg-opacity-75 d-flex align-items-center justify-content-center">
  <div class="card border-success" style="width: 420px;">
    <div class="card-header bg-success text-white text-center fw-bold fs-5">Main Menu</div>
    <div class="card-body px-4 py-4">
      <div class="row g-3">
        @for (item of menuItems; track item.label) {
          <div class="col-6">
            @if (item.enabled) {
              <a
                [routerLink]="item.route"
                class="btn btn-success w-100"
              >
                {{ item.label }}
              </a>
            } @else {
              <button class="btn btn-outline-secondary w-100" disabled>
                {{ item.label }}
              </button>
            }
          </div>
        }
      </div>
    </div>
  </div>
</div>
