<app-page-layout>
  <div class="card border-success mx-auto" style="max-width: 560px;">
    <div class="card-header bg-success text-white text-center fw-bold">IT 09-2</div>
    <div class="card-body">

      <div class="mb-3 row align-items-center">
        <label class="col-sm-4 col-form-label text-end fw-semibold">คำถาม</label>
        <div class="col-sm-8">
          <input type="text" class="form-control" [(ngModel)]="form.questionText" placeholder="กรอกคำถาม" />
        </div>
      </div>

      <div class="mb-3 row align-items-center">
        <label class="col-sm-4 col-form-label text-end fw-semibold">คำตอบ 1</label>
        <div class="col-sm-8">
          <input type="text" class="form-control" [(ngModel)]="form.choiceA" placeholder="ตัวเลือก A" />
        </div>
      </div>

      <div class="mb-3 row align-items-center">
        <label class="col-sm-4 col-form-label text-end fw-semibold">คำตอบ 2</label>
        <div class="col-sm-8">
          <input type="text" class="form-control" [(ngModel)]="form.choiceB" placeholder="ตัวเลือก B" />
        </div>
      </div>

      <div class="mb-3 row align-items-center">
        <label class="col-sm-4 col-form-label text-end fw-semibold">คำตอบ 3</label>
        <div class="col-sm-8">
          <input type="text" class="form-control" [(ngModel)]="form.choiceC" placeholder="ตัวเลือก C" />
        </div>
      </div>

      <div class="mb-3 row align-items-center">
        <label class="col-sm-4 col-form-label text-end fw-semibold">คำตอบ 4</label>
        <div class="col-sm-8">
          <input type="text" class="form-control" [(ngModel)]="form.choiceD" placeholder="ตัวเลือก D" />
        </div>
      </div>

      <div class="mb-3 row align-items-center">
        <label class="col-sm-4 col-form-label text-end fw-semibold">เฉลย</label>
        <div class="col-sm-8">
          <div class="d-flex gap-3">
            @for (opt of choiceOptions; track opt.key) {
              <div class="form-check">
                <input
                  class="form-check-input"
                  type="radio"
                  [id]="'correct-' + opt.key"
                  [value]="opt.key"
                  [(ngModel)]="form.correctChoice"
                  name="correctChoice"
                />
                <label class="form-check-label" [for]="'correct-' + opt.key">{{ opt.label }}</label>
              </div>
            }
          </div>
        </div>
      </div>

      @if (errorMessage) {
        <div class="text-danger small mb-3 text-center">{{ errorMessage }}</div>
      }

      <div class="d-flex justify-content-center gap-3 mt-4">
        <button class="btn btn-primary px-4" (click)="save()" [disabled]="isSaving">บันทึก</button>
        <button class="btn btn-danger px-4" (click)="cancel()">ยกเลิก</button>
      </div>

    </div>
  </div>
</app-page-layout>
